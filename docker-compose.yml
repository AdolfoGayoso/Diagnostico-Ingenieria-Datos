version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  miner:
    build: ./miner
    container_name: miner
    depends_on:
      - redis
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  visualizer:
    build: ./visualizer
    container_name: visualizer
    ports:
      - "8501:8501"
    depends_on:
      - redis
    restart: unless-stopped
